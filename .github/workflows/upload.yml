name: Auto Upload Satisfying Shorts

on:
  schedule:
    - cron: '0 12 * * *'     # runs every day at 12 PM UTC
  workflow_dispatch:

jobs:
  upload_job:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY}}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get install ffmpeg -y

      - name: Generate Script using Gemini
        run: python scripts/generate_script.py

      - name: Generate TTS Audio (Optional)
        run: python scripts/text_to_speech.py

      - name: Create Video
        run: python scripts/create_video.py

      - name: Upload to YouTube
        run: python scripts/upload.py