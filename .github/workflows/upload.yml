name: Auto Upload Satisfying Shorts

on:
  schedule:
    - cron: '0 12 * * *'  # Runs every day at 12 PM UTC
  workflow_dispatch:

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # Checkout repo to access files

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get install ffmpeg -y

      - name: Create Client Secret file
        run: echo "${{ secrets.CLIENT_SECRET }}" > client_secret.json
        shell: bash

      - name: Generate Script using Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_script.py

      - name: Generate TTS Audio (Optional)
        run: python scripts/text_to_speech.py

      - name: Create Video
        run: python scripts/create_video.py

      - name: Upload to YouTube
        run: python scripts/upload.py